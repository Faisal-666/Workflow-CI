name: workflow MLflow

on:
  push:
    branches:
      - main
      
env:
  GH_USERNAME: 'Faisal-666'
  REG_MODEL_NAME: 'Diabetes_Logistic_Regression'
  EXPERIMENT_NAME: 'diabetes model classification'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup py 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          echo $GH_USERNAME
          echo $REG_MODEL_NAME
          echo $EXPERIMENT_NAME

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0
  
      - name: Set MLflow Tracking URI and Token
        run: |
          echo "MLFLOW_TRACKING_URI=https://${{ secrets.DAGSHUB_USERNAME }}:${{ secrets.DAGSHUB_PAT }}@dagshub.com/Faisal-666/diabetes-mlflow.mlflow" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_USERNAME=${{ secrets.DAGSHUB_USERNAME }}" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.DAGSHUB_PAT }}" >> $GITHUB_ENV

      - name: Debug MLflow env
        run: |
          echo "MLFLOW_TRACKING_URI=$MLFLOW_TRACKING_URI"
          echo "MLFLOW_TRACKING_USERNAME=$MLFLOW_TRACKING_USERNAME"
          echo "MLFLOW_TRACKING_PASSWORD=$MLFLOW_TRACKING_PASSWORD"
      
      - name: Run mlflow project with params
        run: |
          mlflow run MLProject --experiment-name="${{ env.EXPERIMENT_NAME }}" --env-manager=local

      - name: Build Docker Model from registered model from latest run
        run: |
          mlflow models build-docker --model-uri 'models:/${{ env.REG_MODEL_NAME }}/latest' --name 'dbts'
          
      - name: Tag Docker IMG
        run: |
          docker tag dbts ${{ secrets.DH_USERNAME }}/dbts:latest
          
      - name: Login to DH
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DH_USERNAME }}
          password: ${{ secrets.DH_PAT }}

      - name: Push Docker IMG
        run: |
          docker push ${{ secrets.DH_USERNAME }}/dbts:latest
